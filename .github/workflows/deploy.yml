name: Deploy IPVA PCD

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_BASE_PATH=/zeroipva/

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        with:
          host: 168.231.90.28
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DATABASE_URL
          script: |
            cd /opt/hubsaas
            # Salva DATABASE_URL para o container zeroipva
            grep -q 'DATABASE_URL_ZEROIPVA=' .env 2>/dev/null && sed -i '/DATABASE_URL_ZEROIPVA=/d' .env
            echo "DATABASE_URL_ZEROIPVA=${DATABASE_URL}" >> .env
            docker compose pull zeroipva
            docker compose up -d zeroipva
